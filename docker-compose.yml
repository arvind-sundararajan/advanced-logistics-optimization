version: '3.9'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
    restart: always
  db:
    image: postgres:13.4
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=advanced_logistics
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always
volumes:
  db-data:
